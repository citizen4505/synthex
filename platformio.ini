; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:due]
platform  = atmelsam
board     = dueUSB
framework = arduino
board_build.mcu = at91sam3x8e
board_build.f_cpu = 84000000L
monitor_speed = 115200
upload_protocol = sam-ba
lib_deps = lathoub/USB-MIDI@^1.1.0
build_flags =
    -std=gnu++17
    -Os                         ; optimalizace velikosti (důležité pro Flash)
    -ffunction-sections         ; každá funkce do vlastní sekce
    -fdata-sections             ; každá proměnná do vlastní sekce
    -Wl,--gc-sections           ; linker vyhodí nepoužívané sekce
    -I include
extra_scripts = post:tools/print_memory.py
